name: mr_helper_security_analyzer
description: MR HELPER - Web Application Security Analyzer. A cybersecurity mobile tool that analyzes website security.
publish_to: 'none'
version: 2.0.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.0.9

  # Firebase
  firebase_core: ^2.24.2
  cloud_firestore: ^4.14.0
  
  # State Management
  provider: ^6.1.1
  
  # Networking
  http: ^1.1.2
  
  # UI Components
  fl_chart: ^0.66.2
  lottie: ^2.7.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.0
  
  # Utilities
  url_launcher: ^6.2.1
  intl: ^0.19.0
  uuid: ^4.2.2
  share_plus: ^7.2.1
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  pdf: ^3.12.0
  printing: ^5.14.3
  local_auth: ^3.0.1
  shared_preferences: ^2.5.5
  flutter_local_notifications: ^22.0.1
  workmanager: ^0.9.0+3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/UniQAIDAR.ttf

  fonts:
    - family: UniQAIDAR
      fonts:
        - asset: assets/fonts/UniQAIDAR.ttf

